name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/*

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build (workspace, default features)
        run: cargo build --workspace --all-targets

      - name: cargo build (workspace, mimalloc)
        run: cargo build -p accelerate --features mimalloc

      - name: cargo test (workspace)
        run: cargo test --workspace --all-targets --no-fail-fast

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
