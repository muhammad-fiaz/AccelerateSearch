version: "3.9"

services:
  accelerate:
    build: .
    image: accelerate:local
    container_name: accelerate
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      ACCELERATE_CONFIG: /app/config/default.toml
      ACCELERATE_DATA_DIR: /data
      RUST_LOG: accelerate=info,actix_web=info
    volumes:
      - accelerate_data:/data
      - accelerate_logs:/logs
    healthcheck:
      test: ["CMD", "/usr/local/bin/accelerate", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  accelerate_data:
  accelerate_logs:
